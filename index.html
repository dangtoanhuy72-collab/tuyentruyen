<!-- KHU VỰC 1: ĐỊNH DẠNG GIAO DIỆN (CSS) - KHÔNG CẦN CHỈNH SỬA -->
<style>
    .infographic-wrapper {
        font-family: "Helvetica Neue", Arial, sans-serif;
        max-width: 850px;
        margin: 20px auto;
        padding: 10px;
        background: #ffffff;
    }
    .info-title-main {
        text-align: center;
        color: #d32f2f;
        font-size: 20px;
        font-weight: bold;
        margin: 30px 0 15px 0;
        text-transform: uppercase;
        border-left: 5px solid #d32f2f;
        padding-left: 10px;
    }
    .map-container-1, .map-container-2 {
        background: #f4f6f9;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 30px 20px;
        text-align: center;
        margin-bottom: 20px;
    }
    /* Sơ đồ 1 */
    .main-node-1 {
        background: #0056b3; color: white;
        padding: 15px 30px; border-radius: 30px;
        display: inline-block; font-weight: bold; font-size: 18px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 35px;
    }
    .branches-1 {
        display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .branch-btn {
        background: #17a2b8; color: white; padding: 12px 10px;
        border-radius: 6px; cursor: pointer; flex: 1; min-width: 150px;
        transition: all 0.3s ease; font-weight: bold; border: none; font-size: 14px;
    }
    .branch-btn:hover { background: #138496; transform: translateY(-2px); }
    
    /* Sơ đồ 2 */
    .grid-city {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        grid-gap: 20px;
        align-items: center;
        max-width: 650px;
        margin: 0 auto;
    }
    .city-btn {
        background: #28a745; color: white; padding: 15px 10px;
        border-radius: 8px; cursor: pointer; font-weight: bold;
        border: none; transition: all 0.3s ease; font-size: 14px;
    }
    .city-btn:hover { background: #218838; transform: translateY(-2px); }
    .center-node {
        background: #343a40; color: white; padding: 20px 10px;
        border-radius: 50%; font-weight: bold; font-size: 15px;
        aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .city-blue { background: #007bff; }
    .city-blue:hover { background: #0069d9; }

    /* Định dạng hộp thoại nổi lên (Popup) */
    .custom-popup-overlay {
        display: none; position: fixed; top: 0; left: 0; 
        width: 100%; height: 100%; background: rgba(0,0,0,0.6);
        z-index: 99999; justify-content: center; align-items: center;
    }
    .custom-popup-box {
        background: white; padding: 25px; border-radius: 10px;
        max-width: 480px; width: 90%; position: relative;
        text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        animation: popupFeIn 0.3s ease;
    }
    @keyframes popupFeIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-title {
        margin-top: 0; color: #0056b3; font-size: 18px;
        border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;
    }
    .popup-content-list { padding-left: 20px; margin: 0; }
    .popup-content-list li { margin-bottom: 10px; line-height: 1.5; color: #333; }
    .popup-close-x {
        position: absolute; top: 10px; right: 15px;
        font-size: 26px; cursor: pointer; color: #bbb; line-height: 1;
    }
    .popup-close-x:hover { color: #333; }
</style>

<div class="infographic-wrapper">

    <!-- ==================== SƠ ĐỒ 1 ==================== -->
    <div class="info-title-main">1. Infographic "Bản đồ Nghị quyết 57"</div>
    <div class="map-container-1">
        <div class="main-node-1">🏛️ NGHỊ QUYẾT 57</div>
        <div class="branches-1">
            <button class="branch-btn" onclick="hienThiPopup('khcn')">🔬 Khoa học công nghệ</button>
            <button class="branch-btn" onclick="hienThiPopup('dmst')">💡 Đổi mới sáng tạo</button>
            <button class="branch-btn" onclick="hienThiPopup('cds')">💻 Chuyển đổi số</button>
            <button class="branch-btn" onclick="hienThiPopup('nls')">👥 Nhân lực số</button>
        </div>
    </div>

    <!-- ==================== SƠ ĐỒ 2 ==================== -->
    <div class="info-title-main">2. Infographic "Thành phố tương lai"</div>
    <div class="map-container-2">
        <div class="grid-city">
            <div></div>
            <button class="city-btn" onclick="hienThiPopup('dttm')">🏢 Đô thị thông minh</button>
            <div></div>
            
            <button class="city-btn city-blue" onclick="hienThiPopup('gttm')">🚗 Giao thông số</button>
            <div class="center-node">🏙️ THÀNH PHỐ SỐ</div>
            <button class="city-btn" onclick="hienThiPopup('yts')">🏥 Y tế số</button>
            
            <div></div>
            <button class="city-btn" onclick="hienThiPopup('gds')">📚 Giáo dục số</button>
            <div></div>
        </div>
    </div>

</div>

<!-- ==================== KHU VỰC HỘP THOẠI POP-UP (NỘI DUNG) ==================== -->
<div id="myUniversalPopup" class="custom-popup-overlay" onclick="dongPopupNgoai(event)">
    <div class="custom-popup-box">
        <span class="popup-close-x" onclick="dongPopup()">&times;</span>
        <h3 id="popTitle" class="popup-title">Tiêu đề</h3>
        <ul id="popContent" class="popup-content-list">
            <!-- Nội dung tự động thay đổi bằng Javascript -->
        </ul>
    </div>
</div>

<!-- KHU VỰC 3: XỬ LÝ ĐÓNG MỞ TƯƠNG TÁC (JAVASCRIPT) - KHÔNG CẦN CHỈNH SỬA -->
<script>
    // Dữ liệu nội dung hiển thị khi bấm nút
    const duLieuNoiDung = {
        'cds': {
            title: "Chuyển đổi số quốc gia",
            items: [
                "Phát triển chính quyền số, kinh tế số, xã hội số.",
                "Lấy người dân, doanh nghiệp làm trung tâm.",
                "Khai thác hiệu quả dữ liệu phục vụ công tác điều hành."
            ]
        },
        'gttm': {
            title: "🚗 Hệ thống giao thông thông minh",
            items: [
                "Hệ thống camera giám sát đô thị thông minh.",
                "Ứng dụng AI phân tích và dự báo các điểm nguy cơ ùn tắc.",
                "Xử lý tự động vi phạm trật tự an toàn giao thông (Phạt nguội).",
                "Quản lý điều hành tuần tra kiểm soát trên nền tảng số."
            ]
        },
        // Các mục khác bạn có thể tự viết thêm nội dung tương tự vào đây nếu cần
        'khcn': { title: "🔬 Khoa học công nghệ", items: ["Đẩy mạnh nghiên cứu và ứng dụng khoa học kỹ thuật.", "Phục vụ trực tiếp vào các nhiệm vụ chuyên môn."] },
        'dmst': { title: "💡 Đổi mới sáng tạo", items: ["Khuyến khích các sáng kiến cải tiến mô hình làm việc.", "Ứng dụng giải pháp mới nâng cao năng suất công tác."] },
        'nls': { title: "👥 Nhân lực số", items: ["Đào tạo, bồi dưỡng kỹ năng công nghệ cho đội ngũ cán bộ.", "Sẵn sàng vận hành các hệ thống cơ sở dữ liệu lớn."] },
        'dttm': { title: "🏢 Đô thị thông minh", items: ["Quy hoạch không gian đô thị dựa trên dữ liệu số.", "Kết nối đồng bộ hạ tầng kỹ thuật và hạ tầng số."] },
        'yts': { title: "🏥 Y tế số", items: ["Hồ sơ sức khỏe điện tử toàn dân.", "Khám chữa bệnh từ xa và quản lý bệnh viện thông minh."] },
        'gds': { title: "📚 Giáo dục số", items: ["Học tập số, bài giảng điện tử tương tác.", "Quản lý văn bằng, chứng chỉ trên nền tảng số hóa."] }
    };

    function hienThiPopup(khoa) {
        const duLieu = duLieuNoiDung[khoa];
        if (duLieu) {
            document.getElementById('popTitle').innerText = duLieu.title;
            const dsNoiDung = document.getElementById('popContent');
            dsNoiDung.innerHTML = ""; // Xóa nội dung cũ
            
            duLieu.items.forEach(function(item) {
                const li = document.createElement('li');
                li.innerText = item;
                dsNoiDung.appendChild(li);
            });
            
            document.getElementById('myUniversalPopup').style.display = 'flex';
        }
    }

    function dongPopup() {
        document.getElementById('myUniversalPopup').style.display = 'none';
    }

    function dongPopupNgoai(e) {
        if (e.target.className === 'custom-popup-overlay') {
            dongPopup();
        }
    }
</script>
